services:

  # =====================================================
  # DOMAIN CONTROLLER
  # =====================================================
  domain-controller:
    build:
      context: ./domain-controller
    container_name: domain-controller
    command: >
      /opt/jboss/wildfly/bin/domain.sh
      --host-config=host-master.xml
      -b 0.0.0.0
      -bmanagement 0.0.0.0
    ports:
      - "9990:9990"
      - "9999:9999"
    environment:
      NODE_NAME: domain-controller
    volumes:
      - ./domain-controller/config/host-master.xml:/opt/jboss/wildfly/domain/configuration/host-master.xml:ro
      - ./domain-controller/domain/configuration/mgmt-users.properties:/opt/jboss/wildfly/domain/configuration/mgmt-users.properties
      - ./domain-controller/domain/configuration/mgmt-groups.properties:/opt/jboss/wildfly/domain/configuration/mgmt-groups.properties
    depends_on:
      - opensearch
      - mongodb
      - graylog
      - otel-collector
    networks:
      - wildfly-net

  # =====================================================
  # HOST 1
  # =====================================================
  host1:
    build:
      context: ./domain-controller
    container_name: host1
    command: >
      /opt/jboss/wildfly/bin/domain.sh
      --host-config=host1.xml
      -Djboss.domain.master.address=domain-controller
      -b 0.0.0.0
      -bmanagement 0.0.0.0
    ports:
      - "8778:8778"
    volumes:
      - ./host1/config/host1.xml:/opt/jboss/wildfly/domain/configuration/host1.xml:ro
    environment:
      NODE_NAME: host1
      JAVA_OPTS: >
        -Dotel.service.name=host1
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4317
        -javaagent:/opt/jolokia/jolokia-agent.jar=port=8778,host=0.0.0.0
        -Djava.util.logging.manager=org.jboss.logmanager.LogManager
    depends_on:
      - domain-controller
      - otel-collector
    networks:
      - wildfly-net

  # =====================================================
  # HOST 2
  # =====================================================
  host2:
    build:
      context: ./domain-controller
    container_name: host2
    command: >
      /opt/jboss/wildfly/bin/domain.sh
      --host-config=host2.xml
      -Djboss.domain.master.address=domain-controller
      -b 0.0.0.0
      -bmanagement 0.0.0.0
    ports:
      - "8779:8778"
    volumes:
      - ./host2/config/host2.xml:/opt/jboss/wildfly/domain/configuration/host2.xml:ro
    environment:
      NODE_NAME: host2
      JAVA_OPTS: >
        -Dotel.service.name=host2
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4317
        -javaagent:/opt/jolokia/jolokia-agent.jar=port=8778,host=0.0.0.0
        -Djava.util.logging.manager=org.jboss.logmanager.LogManager
    depends_on:
      - domain-controller
      - otel-collector
    networks:
      - wildfly-net

  # =====================================================
  # NGINX LOAD BALANCER
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - host1
      - host2
    networks:
      - wildfly-net

  # =====================================================
  # PROMETHEUS
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - host1
      - host2
    networks:
      - wildfly-net

  # =====================================================
  # GRAFANA
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - wildfly-net

  # =====================================================
  # OPENTELEMETRY COLLECTOR
  # =====================================================
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - wildfly-net

  # =====================================================
  # OPENSEARCH
  # =====================================================
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch
    environment:
      plugins.security.disabled: "true"
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./opensearch/data:/usr/share/opensearch/data
    networks:
      - wildfly-net

  # =====================================================
  # MONGODB
  # =====================================================
  mongodb:
    image: mongo:noble
    container_name: mongodb
    volumes:
      - ./mongodb/data:/data/db
    networks:
      - wildfly-net

  # =====================================================
  # GRAYLOG
  # =====================================================
  graylog:
    image: graylog/graylog:6.2.12-1
    container_name: graylog
    environment:
      GRAYLOG_PASSWORD_SECRET: soa23e0597b418c6fd
      GRAYLOG_ROOT_PASSWORD_SHA2: e86f78a8a3caf0b60d8e74e5942aa6d86dc150cd3c03338aef25b7d2d7e3acc7
      GRAYLOG_HTTP_EXTERNAL_URI: http://localhost:9000/
      GRAYLOG_ELASTICSEARCH_HOSTS: http://opensearch:9200
      GRAYLOG_MONGODB_URI: mongodb://mongodb:27017/graylog
      TZ: America/Sao_Paulo
    ports:
      - "9000:9000"
      - "12201:12201/udp"
    depends_on:
      - opensearch
      - mongodb
    networks:
      - wildfly-net

networks:
  wildfly-net:
    driver: bridge
