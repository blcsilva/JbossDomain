receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  debug:
    verbosity: detailed
  otlphttp:
    endpoint: http://graylog:4318
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [debug, otlphttp]
    traces:
      receivers: [otlp]
      exporters: [debug, otlphttp]
