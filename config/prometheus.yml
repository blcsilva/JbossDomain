global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "wildfly-host1"
    metrics_path: /jolokia/read/java.lang:type=Memory/HeapMemoryUsage
    static_configs:
      - targets: ["host1:8778"]

  - job_name: "wildfly-host2"
    metrics_path: /jolokia/read/java.lang:type=Memory/HeapMemoryUsage
    static_configs:
      - targets: ["host2:8778"]
